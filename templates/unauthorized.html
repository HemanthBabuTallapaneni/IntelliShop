{% extends "base.html" %}

{% block title %}Access Denied - IntelliShop{% endblock %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-6 text-center">
        <div class="glass-card p-5" style="border-color: rgba(220, 53, 69, 0.3);">
            <div class="d-inline-flex p-4 rounded-circle mb-4" style="background: rgba(220, 53, 69, 0.1);">
                <i class="fa-solid fa-triangle-exclamation text-danger fs-1"></i>
            </div>
            
            <h2 class="text-dark mb-3">Security Guard Enforced</h2>
            <p class="text-muted mb-4">{{ error or "Your credentials are not authorized to access this state transition." }}</p>
            
            <hr class="border-light my-4">
            
            <div class="d-flex justify-content-center gap-3">
                <a href="/" class="btn btn-outline-dark rounded-pill px-4">
                    <i class="fa-solid fa-house me-2"></i> Go Home
                </a>
                <a href="/logout" class="btn btn-danger rounded-pill px-4">
                    <i class="fa-solid fa-right-from-bracket me-2"></i> Switch User
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
