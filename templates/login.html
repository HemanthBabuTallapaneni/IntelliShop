<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IntelliShop</title>
    <!-- Google Fonts: Inter & Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --border-glass: rgba(15, 23, 42, 0.08);
            --accent-purple: #111111; /* Matte Black */
            --accent-cyan: #0f172a; /* Deep Navy */
            --text-main: #111111; /* Matte Black */
            --text-muted: #475569; /* Muted Slate */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, var(--bg-primary) 80%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 2rem 1rem;
        }

        h1, h2, h3, h5, .brand-font {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            max-width: 450px;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: var(--text-main) !important;
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }

        .form-control:focus {
            box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.05) !important;
            border-color: var(--accent-cyan) !important;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white;
            border: none;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-submit:hover {
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
            transform: translateY(-1px);
        }

        .demo-pill {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .demo-pill:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            transform: translateX(4px);
        }

        .role-badge {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .role-shopper { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
        .role-seller { background: #f1f5f9; color: #0f172a; border: 1px solid #cbd5e1; }
        .role-admin { background: #111111; color: #ffffff; border: 1px solid #111111; }
    </style>
</head>
<body>

    <div class="glass-card p-5">
        <div class="text-center mb-4">
            <div class="d-inline-flex p-3 rounded-circle mb-3" style="background: rgba(15, 23, 42, 0.05); border: 1px solid rgba(15, 23, 42, 0.12);">
                <i class="fa-solid fa-cube fs-1 text-primary" style="color: var(--accent-cyan) !important;"></i>
            </div>
            <h2 class="mb-1 text-dark">IntelliShop</h2>
            <p class="text-muted small">Multi-Role Intelligent Orchestration Dashboard</p>
        </div>

        {% if error %}
            <div class="alert alert-danger border-0 text-center small p-2" style="background: rgba(220, 53, 69, 0.1); color: #dc2626;">
                <i class="fa-solid fa-circle-exclamation me-1"></i> {{ error }}
            </div>
        {% endif %}

        <form action="/login" method="POST" class="mb-4">
            <div class="mb-3">
                <label for="username" class="form-label small text-muted">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small text-muted">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-submit">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Authenticate & Connect
            </button>
        </form>

        <div class="pt-3 border-top" style="border-color: rgba(15, 23, 42, 0.08) !important;">
            <h5 class="text-dark small mb-3 text-center"><i class="fa-solid fa-user-shield me-2 text-warning"></i>Select Simulation Persona</h5>
            <div class="demo-list">
                {% for u in demo_users %}
                    <div class="demo-pill" onclick="fillForm('{{ u.username }}', '{{ u.password }}')">
                        <div>
                            <span class="text-dark fw-bold small">@{{ u.username }}</span>
                            <span class="text-muted block small ms-2" style="font-size: 0.75rem;">(pass: {{ u.password }})</span>
                        </div>
                        <span class="role-badge role-{{ u.role }}">{{ u.role }}</span>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        function fillForm(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }
    </script>
</body>
</html>
